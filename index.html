<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>怪談白物語 GMツール</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background: #f4f4f9; margin: 0; color: #333; }
        .container { max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h2, h3, h4 { margin-top: 0; }
        
        /* 画面共有用エリア */
        .shared-view { border: 3px solid #333; padding: 25px; min-height: 150px; font-size: 1.3em; background: #fafafa; line-height: 1.8; border-radius: 4px; }
        .replaced { background: #ffeb3b; font-weight: bold; padding: 2px 6px; border: 1px solid #d4d400; border-radius: 4px; color: #000; }
        
        /* コントロール群 */
        .stats { font-size: 1.5em; font-weight: bold; color: #d32f2f; margin-bottom: 10px; }
        .keyword-pool { margin: 10px 0; padding: 12px; background: #e9ecef; border-radius: 4px; min-height: 24px; }
        .done { text-decoration: line-through; color: #999; margin-right: 10px; }
        .undone { font-weight: bold; margin-right: 10px; color: #333; }
        
        /* フォーム部品 */
        input[type="text"], textarea, select { width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        textarea { height: 150px; resize: vertical; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; align-items: center; }
        .btn-danger { background: #dc3545; }
        .btn-success { background: #28a745; }
        .btn-secondary { background: #6c757d; }
        .btn-accent { background: #6f42c1; } 
        .file-input-label { padding: 10px 15px; background: #28a745; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; display: inline-block; }
        #importFile { display: none; }
        
        /* 履歴リスト */
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { display: flex; justify-content: space-between; align-items: center; background: #fff3cd; padding: 8px 12px; border: 1px solid #ffeeba; border-radius: 4px; margin-bottom: 5px; font-weight: bold; }
        .history-item button { padding: 4px 8px; font-size: 0.8em; background: #dc3545; }

        /* トースト通知 */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 12px 20px; color: white; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.3s, transform 0.3s; transform: translateY(-10px); min-width: 200px; font-weight: bold; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        .toast.info { background: #17a2b8; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="container">
    <div class="box">
        <h2>物語の表示（画面共有用）</h2>
        <div id="sharedView" class="shared-view">シナリオを選択してください</div>
        <div class="btn-group" style="margin-top: 15px;">
            <button onclick="prevParagraph()" class="btn-secondary">＜ 前の段落へ</button>
            <button onclick="nextParagraph()" class="btn-success">次の段落へ ＞</button>
            <button onclick="openPopoutWindow()" class="btn-accent">ポップアウト表示</button>
            
            <div style="display: flex; align-items: center; gap: 8px; background: #e9ecef; padding: 6px 12px; border-radius: 4px; font-size: 0.9em; border: 1px solid #ccc;">
                <span style="font-weight: bold; color: #495057;">共有窓文字サイズ:</span>
                <input type="range" id="fontSizeSlider" min="0.5" max="10.0" step="0.1" value="1.6" oninput="changeFontSize(this.value)" style="width: 120px; margin: 0; cursor: pointer;">
                <span id="fontSizeDisplay" style="font-weight: bold; color: #007bff; width: 36px; text-align: right;">1.6</span><span style="font-weight: bold; color: #495057;">em</span>
            </div>
        </div>
    </div>

    <div class="box">
        <h3>GM専用：セッション進行パネル</h3>
        
        <input type="text" id="searchScenario" placeholder="シナリオを検索..." onkeyup="filterScenarios()" style="margin-bottom: 5px;">
        <select id="storySelector" onchange="loadStory()"></select>

        <div class="btn-group" style="margin-bottom: 15px;">
            <button onclick="loadScenarioForEdit()" class="btn-secondary">選択中のシナリオを編集</button>
            <button onclick="deleteCurrentScenario()" class="btn-danger">選択中のシナリオを削除</button>
        </div>

        <div class="stats">進捗: <span id="progress">0</span> / <span id="total">0</span> 件</div>
        <div id="keywordStatus" class="keyword-pool">要キーワード: </div>
        
        <div style="background: #e3f2fd; padding: 15px; border-radius: 4px; border: 1px solid #b6d4fe; margin-bottom: 15px;">
            <h4 style="margin-bottom: 10px; color: #084298;">キーワードの改変</h4>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="beforeKey" placeholder="対象キーワード (例: 人形)" style="flex: 1; margin: 0;">
                <span style="font-weight: bold;">→</span>
                <input type="text" id="afterKey" placeholder="改変後の言葉 (例: タワシ)" style="flex: 1; margin: 0;">
                <button onclick="addReplacement()">改変登録</button>
            </div>
        </div>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 15px;">
            <h4 style="margin-bottom: 10px; color: #495057;">読み上げ詳細設定</h4>
            <div style="display: flex; flex-direction: column; gap: 10px; font-size: 0.9em;">
                <div>
                    <label style="font-weight: bold; color: #555;">音声エンジン:</label>
                    <select id="engineSelector" onchange="toggleEngineUI()" style="margin: 5px 0 10px 0;">
                        <option value="standard">ブラウザ標準 (Web Speech API)</option>
                        <option value="talkv3">talkv3 (完全に独立した軽量JSエンジン)</option>
                    </select>
                </div>
                <div id="voiceSelectContainer">
                    <label style="font-weight: bold; color: #555;">音声の種類:</label>
                    <select id="voiceSelector" onchange="updateAudioSettings()" style="margin: 5px 0 0 0;"></select>
                </div>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 120px;">
                        <label style="font-weight: bold; color: #555;">音量: <span id="volDisp">1.0</span></label>
                        <input type="range" id="audioVol" min="0" max="1" step="0.1" value="1.0" oninput="updateAudioSettings()" style="width: 100%; cursor: pointer;">
                    </div>
                    <div style="flex: 1; min-width: 120px;">
                        <label style="font-weight: bold; color: #555;">速度: <span id="rateDisp">1.3</span></label>
                        <input type="range" id="audioRate" min="0.5" max="3.0" step="0.1" value="1.3" oninput="updateAudioSettings()" style="width: 100%; cursor: pointer;">
                    </div>
                    <div style="flex: 1; min-width: 120px;">
                        <label style="font-weight: bold; color: #555;">ピッチ: <span id="pitchDisp">1.4</span></label>
                        <input type="range" id="audioPitch" min="0.5" max="2.0" step="0.1" value="1.4" oninput="updateAudioSettings()" style="width: 100%; cursor: pointer;">
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <h4>現在の改変履歴 (修正・削除)</h4>
            <ul id="historyList" class="history-list">
                </ul>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <h4>データの保存と復元</h4>
        <div class="btn-group">
            <button onclick="exportData()" class="btn-secondary">データをファイルに保存</button>
            <label class="file-input-label" for="importFile">データファイルを読み込み</label>
            <input type="file" id="importFile" accept=".json" onchange="importData(event)">
            <button onclick="resetAllData()" class="btn-danger">全データ初期化</button>
        </div>
    </div>

    <div class="box" id="editorArea">
        <h3 id="editorTitle">シナリオ新規登録</h3>
        <input type="hidden" id="editTargetId" value="">
        <input type="text" id="newTitle" placeholder="タイトル（例：隙間男）">
        <textarea id="newText" placeholder="物語本文（※段落間に1行の空行を入れてください）"></textarea>
        <input type="text" id="newKeywords" placeholder="ターゲットキーワード（カンマ区切り。例：人形,夜中,鏡）">
        <div class="btn-group">
            <button onclick="saveStory()" class="btn-success">シナリオを保存する</button>
            <button onclick="cancelEdit()" id="cancelEditBtn" class="btn-secondary" style="display: none;">編集をキャンセル</button>
        </div>
    </div>
</div>

<script>
    // --- データ構造 (v1.4.0) ---
    let appData = { 
        version: "1.4.0",
        stories: {}, 
        currentId: "", 
        replacements: {}, 
        currentIndex: 0,
        popoutFontSize: 1.6,
        audioSettings: {
            engineType: "standard",
            volume: 1.0,
            rate: 1.3,
            pitch: 1.4,
            voiceName: ""
        }
    };

    // --- ポップアウト連動用管理 ---
    const syncChannel = new BroadcastChannel('kaidan_tool_popout_channel');

    syncChannel.onmessage = (event) => {
        if (event.data.type === 'REQUEST_INIT') {
            sendContentToPopout();
        } else if (event.data.type === 'VOLUME_CHANGED') {
            appData.audioSettings.volume = event.data.volume;
            document.getElementById('audioVol').value = event.data.volume;
            document.getElementById('volDisp').textContent = event.data.volume.toFixed(1);
            persistData();
            sendContentToPopout(); 
        }
    };

    function getPlainReplacements(text) {
        let plainText = text;
        const keys = Object.keys(appData.replacements).sort((a, b) => b.length - a.length);
        keys.forEach(key => {
            const safeRegex = new RegExp(key.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g');
            plainText = plainText.replace(safeRegex, appData.replacements[key]);
        });
        return plainText;
    }

    function sendContentToPopout() {
        const s = appData.stories[appData.currentId];
        let paragraphsArray = [];
        if (s) {
            const rawParagraphs = s.text.split(/\n\s*\n/);
            for (let i = 0; i < appData.currentIndex; i++) {
                paragraphsArray.push(getPlainReplacements(rawParagraphs[i]));
            }
        }

        const html = document.getElementById('sharedView').innerHTML;
        syncChannel.postMessage({ 
            type: 'UPDATE_CONTENT', 
            html: html,
            fontSize: appData.popoutFontSize || 1.6,
            paragraphs: paragraphsArray,
            audioSettings: appData.audioSettings
        });
    }

    function changeFontSize(val) {
        appData.popoutFontSize = parseFloat(val);
        document.getElementById('fontSizeDisplay').textContent = appData.popoutFontSize.toFixed(1);
        persistData();
        sendContentToPopout();
    }

    function populateVoiceList() {
        if (typeof speechSynthesis === 'undefined') return;
        const voices = speechSynthesis.getVoices();
        const sel = document.getElementById('voiceSelector');
        if (!sel) return;
        
        const currentSelected = appData.audioSettings ? appData.audioSettings.voiceName : "";
        sel.innerHTML = '<option value="">-- ブラウザ既定の声 --</option>';
        
        voices.forEach(v => {
            if (v.lang.startsWith('ja')) {
                const option = document.createElement('option');
                option.value = v.name;
                option.textContent = `${v.name} (${v.lang})`;
                if (currentSelected === v.name) {
                    option.selected = true;
                }
                sel.appendChild(option);
            }
        });
    }

    function toggleEngineUI() {
        const engine = document.getElementById('engineSelector').value;
        const voiceContainer = document.getElementById('voiceSelectContainer');
        if (engine === 'talkv3') {
            voiceContainer.style.display = 'none';
        } else {
            voiceContainer.style.display = 'block';
        }
        updateAudioSettings();
    }

    function updateAudioSettings() {
        if (!appData.audioSettings) appData.audioSettings = {};
        appData.audioSettings.engineType = document.getElementById('engineSelector').value;
        appData.audioSettings.volume = parseFloat(document.getElementById('audioVol').value);
        appData.audioSettings.rate = parseFloat(document.getElementById('audioRate').value);
        appData.audioSettings.pitch = parseFloat(document.getElementById('audioPitch').value);
        appData.audioSettings.voiceName = document.getElementById('voiceSelector').value;
        
        document.getElementById('volDisp').textContent = appData.audioSettings.volume.toFixed(1);
        document.getElementById('rateDisp').textContent = appData.audioSettings.rate.toFixed(1);
        document.getElementById('pitchDisp').textContent = appData.audioSettings.pitch.toFixed(1);
        
        persistData();
        sendContentToPopout();
    }

    function renderAudioSettingsUI() {
        const s = appData.audioSettings;
        if (!s) return;
        document.getElementById('engineSelector').value = s.engineType ?? "standard";
        document.getElementById('audioVol').value = s.volume ?? 1.0;
        document.getElementById('volDisp').textContent = (s.volume ?? 1.0).toFixed(1);
        document.getElementById('audioRate').value = s.rate ?? 1.3;
        document.getElementById('rateDisp').textContent = (s.rate ?? 1.3).toFixed(1);
        document.getElementById('audioPitch').value = s.pitch ?? 1.4;
        document.getElementById('pitchDisp').textContent = (s.pitch ?? 1.4).toFixed(1);
        
        if (s.engineType === 'talkv3') {
            document.getElementById('voiceSelectContainer').style.display = 'none';
        } else {
            document.getElementById('voiceSelectContainer').style.display = 'block';
        }
        populateVoiceList();
    }

    function openPopoutWindow() {
        const popoutWindow = window.open('', 'KaidanToolPopoutWindow', 'width=750,height=500,menubar=no,toolbar=no,status=no');
        if (!popoutWindow) return;
        
        const styles = Array.from(document.styleSheets).map(sheet => {
            try { return Array.from(sheet.cssRules).map(rule => rule.cssText).join(''); } catch(e) { return ''; }
        }).join('');
        
        popoutWindow.document.open();
        popoutWindow.document.write(`
            <!DOCTYPE html>
            <html lang="ja">
            <head>
                <meta charset="UTF-8">
                <title>怪談白物語 - 画面共有ミラー</title>
                <link rel="preconnect" href="https://fonts.googleapis.com">
                <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                <link href="https://fonts.googleapis.com/css2?family=New+Tegomin&display=swap" rel="stylesheet">
                <style>
                    ${styles}
                    body { 
                        background: #0d0404; 
                        color: #ded3d3; 
                        padding: 24px; 
                        padding-bottom: 70px; 
                        margin: 0; 
                        height: 100vh; 
                        box-sizing: border-box; 
                        overflow: hidden; 
                        font-family: 'New Tegomin', 'Hiragino Mincho ProN', 'MS Mincho', serif;
                    }
                    .shared-view { 
                        height: 100%; 
                        border: none; 
                        padding: 0; 
                        background: transparent; 
                        overflow-y: auto; 
                        box-shadow: none; 
                        min-height: auto; 
                        font-size: 1.6em; 
                        line-height: 2.0; 
                        letter-spacing: 0.05em;
                    }
                    p { margin-top: 0; margin-bottom: 1.5em; }
                    
                    .replaced { 
                        font-family: 'Helvetica Neue', Arial, sans-serif !important; 
                        background: #ffeb3b !important; 
                        color: #000000 !important;
                        border: 1px solid #d4d400 !important;
                        font-weight: bold !important;
                    }

                    .audio-ctrl-container {
                        position: fixed;
                        bottom: 15px;
                        left: 50%;
                        transform: translateX(-50%);
                        background: rgba(13, 4, 4, 0.95);
                        border: 1px solid #3a1a1a;
                        padding: 6px 14px;
                        border-radius: 4px;
                        font-family: 'New Tegomin', serif;
                        font-size: 0.85em;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        box-shadow: 0 0 15px rgba(0,0,0,0.8);
                        opacity: 0.2;
                        transition: opacity 0.3s;
                        z-index: 9999;
                    }
                    .audio-ctrl-container:hover {
                        opacity: 1.0;
                    }
                    .audio-main-btn {
                        background: transparent;
                        border: none;
                        color: #bfaaaa;
                        cursor: pointer;
                        font-weight: bold;
                        font-family: inherit;
                        padding: 0;
                        font-size: 1em;
                        outline: none;
                    }
                    .audio-main-btn:hover {
                        color: #ded3d3;
                    }
                    .audio-sub-menu {
                        display: none;
                        gap: 8px;
                        border-left: 1px solid #4a2a2a;
                        padding-left: 10px;
                        align-items: center;
                    }
                    .audio-sub-menu.open {
                        display: flex;
                    }
                    .audio-btn {
                        background: #1a0a0a;
                        border: 1px solid #4a2a2a;
                        color: #ded3d3;
                        padding: 2px 8px;
                        border-radius: 3px;
                        cursor: pointer;
                        font-family: inherit;
                        font-size: 0.9em;
                        outline: none;
                        transition: background 0.2s;
                    }
                    .audio-btn:hover {
                        background: #3a1a1a;
                        color: #ffffff;
                    }
                </style>
            </head>
            <body>
                <div id="sharedView" class="shared-view">${document.getElementById('sharedView').innerHTML}</div>
                
                <div class="audio-ctrl-container">
                    <button id="audioMainBtn" class="audio-main-btn" onclick="toggleAudioMenu()">【読み上げ ＞】</button>
                    <div id="audioSubMenu" class="audio-sub-menu">
                        <button class="audio-btn" onclick="playCurrent()">再生（現段落）</button>
                        <button class="audio-btn" onclick="playAll()">再生（全体）</button>
                        <button class="audio-btn" onclick="pauseResume()">一時停止/再開</button>
                        <button class="audio-btn" onclick="stopAudio()">停止</button>
                        
                        <div style="display: flex; align-items: center; gap: 4px; border-left: 1px solid #4a2a2a; padding-left: 8px; margin-left: 4px;">
                            <span style="color: #bfaaaa; font-size: 0.9em;">音量:</span>
                            <input type="range" id="popoutVolSlider" min="0" max="1" step="0.1" value="1.0" oninput="changeVolume(this.value)" style="width: 70px; cursor: pointer; vertical-align: middle; margin: 0;">
                        </div>
                    </div>
                </div>

                <script>
                    const syncChannel = new BroadcastChannel('kaidan_tool_popout_channel');
                    const view = document.getElementById('sharedView');
                    
                    let currentParagraphs = [];
                    let isPlayingAll = false;
                    let allPlayIndex = 0;
                    let audioSettings = { engineType: "standard", volume: 1.0, rate: 1.3, pitch: 1.4, voiceName: "" };
                    
                    // talkv3用 独立オーディオコンテキスト管理
                    let talkV3Ctx = null;
                    let talkV3Osc = null;
                    let talkV3Gain = null;
                    let talkV3Timeout = null;
                    let talkV3Queue = [];
                    let talkV3Index = 0;
                    let talkV3EndCallback = null;
                    let talkV3IsPaused = false;

                    syncChannel.onmessage = (event) => {
                        if (event.data.type === 'UPDATE_CONTENT') {
                            stopAudio();
                            isPlayingAll = false;

                            view.innerHTML = event.data.html;
                            view.style.fontSize = event.data.fontSize + 'em';
                            currentParagraphs = event.data.paragraphs || [];
                            
                            if (event.data.audioSettings) {
                                audioSettings = event.data.audioSettings;
                                const volSlider = document.getElementById('popoutVolSlider');
                                if (volSlider) volSlider.value = audioSettings.volume ?? 1.0;
                            }
                            
                            setTimeout(() => { view.scrollTop = view.scrollHeight; }, 30);
                        }
                    };

                    function toggleAudioMenu() {
                        const menu = document.getElementById('audioSubMenu');
                        const btn = document.getElementById('audioMainBtn');
                        if (menu.classList.contains('open')) {
                            menu.classList.remove('open');
                            btn.textContent = '【読み上げ ＞】';
                        } else {
                            menu.classList.add('open');
                            btn.textContent = '【読み上げ ▼】';
                        }
                    }

                    function changeVolume(val) {
                        const vol = parseFloat(val);
                        audioSettings.volume = vol;
                        if (talkV3Gain && talkV3Ctx) {
                            talkV3Gain.gain.setValueAtTime(vol, talkV3Ctx.currentTime);
                        }
                        syncChannel.postMessage({ type: 'VOLUME_CHANGED', volume: vol });
                    }

                    // --- talkv3 軽量JSエンジンコア実装 ---
                    function playTalkV3(text, onEnd) {
                        stopTalkV3();
                        talkV3IsPaused = false;
                        talkV3EndCallback = onEnd;
                        
                        // かな文字マッピング（簡略型ファミコン風音源エンジン）
                        const cleanText = text.replace(/[、。！？」『』\s]/g, ' ').trim();
                        if (!cleanText) { if (onEnd) onEnd(); return; }
                        
                        talkV3Queue = cleanText.split('');
                        talkV3Index = 0;
                        
                        if (!talkV3Ctx) {
                            talkV3Ctx = new (window.AudioContext || window.webkitAudioContext)();
                        }
                        
                        talkV3Osc = talkV3Ctx.createOscillator();
                        talkV3Gain = talkV3Ctx.createGain();
                        
                        // ピッチ調整に基づく基本波形（レトロな矩形波/三角波テイスト）
                        talkV3Osc.type = 'triangle';
                        talkV3Osc.connect(talkV3Gain);
                        talkV3Gain.connect(talkV3Ctx.destination);
                        
                        talkV3Gain.gain.setValueAtTime(audioSettings.volume ?? 1.0, talkV3Ctx.currentTime);
                        talkV3Osc.start();
                        
                        talkV3NextChar();
                    }

                    function talkV3NextChar() {
                        if (talkV3IsPaused) return;
                        if (talkV3Index >= talkV3Queue.length) {
                            stopTalkV3();
                            if (talkV3EndCallback) talkV3EndCallback();
                            return;
                        }
                        
                        const char = talkV3Queue[talkV3Index];
                        talkV3Index++;
                        
                        // 速度とピッチの反映計算
                        const baseDuration = 110 / (audioSettings.rate ?? 1.3); 
                        const baseFreq = 180 * (audioSettings.pitch ?? 1.4);
                        
                        if (char === ' ') {
                            talkV3Gain.gain.setValueAtTime(0, talkV3Ctx.currentTime);
                            talkV3Timeout = setTimeout(talkV3NextChar, baseDuration * 1.5);
                        } else {
                            // 文字ハッシュによる擬似イントネーション変調
                            const code = char.charCodeAt(0);
                            const modFreq = baseFreq + (code % 12) * 8; 
                            
                            talkV3Osc.frequency.setValueAtTime(modFreq, talkV3Ctx.currentTime);
                            talkV3Gain.gain.setValueAtTime(audioSettings.volume ?? 1.0, talkV3Ctx.currentTime);
                            
                            talkV3Timeout = setTimeout(() => {
                                talkV3Gain.gain.setValueAtTime(0, talkV3Ctx.currentTime);
                                talkV3Timeout = setTimeout(talkV3NextChar, baseDuration * 0.2);
                            }, baseDuration * 0.8);
                        }
                    }

                    function stopTalkV3() {
                        clearTimeout(talkV3Timeout);
                        if (talkV3Osc) {
                            try { talkV3Osc.stop(); talkV3Osc.disconnect(); } catch(e){}
                            talkV3Osc = null;
                        }
                    }

                    function speakText(text, onEndCallback) {
                        window.speechSynthesis.cancel();
                        stopTalkV3();
                        
                        if (!text) {
                            if (onEndCallback) onEndCallback();
                            return;
                        }

                        // エンジン分岐処理
                        if (audioSettings.engineType === "talkv3") {
                            playTalkV3(text, onEndCallback);
                        } else {
                            const uttr = new SpeechSynthesisUtterance(text);
                            const voices = window.speechSynthesis.getVoices();
                            
                            let selectedVoice = null;
                            if (audioSettings.voiceName) {
                                selectedVoice = voices.find(v => v.name === audioSettings.voiceName);
                            }
                            if (!selectedVoice) {
                                selectedVoice = voices.find(v => v.lang === 'ja-JP' || v.lang.startsWith('ja'));
                            }
                            if (selectedVoice) uttr.voice = selectedVoice;
                            
                            uttr.volume = audioSettings.volume ?? 1.0;
                            uttr.pitch = audioSettings.pitch ?? 1.4; 
                            uttr.rate = audioSettings.rate ?? 1.3;  
                            
                            uttr.onend = () => { if (onEndCallback) onEndCallback(); };
                            uttr.onerror = () => { isPlayingAll = false; };
                            
                            window.speechSynthesis.speak(uttr);
                        }
                    }

                    function playCurrent() {
                        isPlayingAll = false;
                        if (currentParagraphs.length === 0) return;
                        const text = currentParagraphs[currentParagraphs.length - 1];
                        speakText(text);
                    }

                    function playAll() {
                        if (currentParagraphs.length === 0) return;
                        isPlayingAll = true;
                        allPlayIndex = 0;
                        playNextInAll();
                    }

                    function playNextInAll() {
                        if (!isPlayingAll) return;
                        if (allPlayIndex < currentParagraphs.length) {
                            const text = currentParagraphs[allPlayIndex];
                            allPlayIndex++;
                            speakText(text, () => {
                                setTimeout(() => { playNextInAll(); }, 400); 
                            });
                        } else {
                            isPlayingAll = false;
                        }
                    }

                    function pauseResume() {
                        if (audioSettings.engineType === "talkv3") {
                            if (talkV3Osc) {
                                if (talkV3IsPaused) {
                                    talkV3IsPaused = false;
                                    talkV3NextChar();
                                } else {
                                    talkV3IsPaused = true;
                                    clearTimeout(talkV3Timeout);
                                    if (talkV3Gain && talkV3Ctx) talkV3Gain.gain.setValueAtTime(0, talkV3Ctx.currentTime);
                                }
                            }
                        } else {
                            if (window.speechSynthesis.speaking) {
                                if (window.speechSynthesis.paused) {
                                    window.speechSynthesis.resume();
                                } else {
                                    window.speechSynthesis.pause();
                                }
                            }
                        }
                    }

                    function stopAudio() {
                        isPlayingAll = false;
                        window.speechSynthesis.cancel();
                        stopTalkV3();
                    }

                    syncChannel.postMessage({ type: 'REQUEST_INIT' });
                <\/script>
            </body>
            </html>
        `);
        popoutWindow.document.close();
        popoutWindow.focus();
    }

    // --- ユーティリティ関数 ---
    function showToast(msg, type = "success") {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = msg;
        container.appendChild(toast);
        void toast.offsetWidth; 
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>'"]/g, tag => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[tag] || tag));
    }

    function persistData() {
        localStorage.setItem('kaidan_data', JSON.stringify(appData));
    }

    function renderAll() {
        persistData();
        renderSharedView();
        renderGMPanel();
        renderHistory();
        renderAudioSettingsUI();
        
        if (document.getElementById('fontSizeSlider')) {
            const size = appData.popoutFontSize || 1.6;
            document.getElementById('fontSizeSlider').value = size;
            document.getElementById('fontSizeDisplay').textContent = size.toFixed(1);
        }
    }

    // --- シナリオ管理 (CRUD) ---
    function saveStory() {
        const targetId = document.getElementById('editTargetId').value;
        const title = document.getElementById('newTitle').value.trim();
        const text = document.getElementById('newText').value;
        const keywordsRaw = document.getElementById('newKeywords').value;
        
        if (!title || !text) { showToast("タイトルと本文は必須です", "error"); return; }
        
        const keywordsArray = keywordsRaw.split(',').map(s => s.trim()).filter(s => s.length > 0);
        const uniqueKeywords = [...new Set(keywordsArray)];
        
        const id = targetId || ("s" + Date.now());
        
        appData.stories[id] = { title: title, text: text, keywords: uniqueKeywords };
        
        cancelEdit(); 
        updateSelector();
        showToast(targetId ? "シナリオを更新しました" : "シナリオを新規登録しました");
        
        if(targetId === appData.currentId) renderAll();
    }

    function updateSelector() {
        const sel = document.getElementById('storySelector');
        sel.innerHTML = '<option value="">-- ストーリーを選択してください --</option>';
        for (let id in appData.stories) {
            const option = document.createElement('option');
            option.value = id;
            option.textContent = appData.stories[id].title;
            sel.appendChild(option);
        }
        if (appData.stories[appData.currentId]) {
            sel.value = appData.currentId;
        }
        filterScenarios(); 
        persistData();
    }

    function filterScenarios() {
        const query = document.getElementById('searchScenario').value.toLowerCase();
        const sel = document.getElementById('storySelector');
        const options = sel.getElementsByTagName('option');
        for (let i = 1; i < options.length; i++) {
            const txt = options[i].textContent.toLowerCase();
            options[i].style.display = txt.includes(query) ? "" : "none";
        }
    }

    function loadStory() {
        appData.currentId = document.getElementById('storySelector').value;
        appData.currentIndex = 0;
        appData.replacements = {};
        renderAll();
    }

    function loadScenarioForEdit() {
        const id = appData.currentId;
        const s = appData.stories[id];
        if (!s) { showToast("編集するシナリオを選択してください", "error"); return; }
        
        document.getElementById('editorTitle').textContent = `シナリオ編集: ${s.title}`;
        document.getElementById('editTargetId').value = id;
        document.getElementById('newTitle').value = s.title;
        document.getElementById('newText').value = s.text;
        document.getElementById('newKeywords').value = s.keywords.join(', ');
        
        document.getElementById('cancelEditBtn').style.display = "inline-block";
        document.getElementById('editorArea').scrollIntoView({ behavior: "smooth" });
        showToast("編集モードに移行しました", "info");
    }

    function cancelEdit() {
        document.getElementById('editorTitle').textContent = "シナリオ新規登録";
        document.getElementById('editTargetId').value = "";
        document.getElementById('newTitle').value = "";
        document.getElementById('newText').value = "";
        document.getElementById('newKeywords').value = "";
        document.getElementById('cancelEditBtn').style.display = "none";
    }

    function deleteCurrentScenario() {
        const id = appData.currentId;
        if (!id || !appData.stories[id]) { showToast("削除するシナリオが選択されていません", "error"); return; }
        
        if (confirm(`シナリオ「${appData.stories[id].title}」を削除しますか？\nこの操作は取り消せません。`)) {
            delete appData.stories[id];
            appData.currentId = "";
            appData.currentIndex = 0;
            appData.replacements = {};
            updateSelector();
            renderAll();
            showToast("シナリオを削除しました", "success");
        }
    }

    // --- 進行・描画ロジック ---
    function nextParagraph() {
        const s = appData.stories[appData.currentId];
        if (!s) { showToast("ストーリーを選択してください", "error"); return; }
        const paragraphs = s.text.split(/\n\s*\n/);
        if (appData.currentIndex < paragraphs.length) {
            appData.currentIndex++;
            renderAll();
        } else {
            showToast("物語は最後まで表示されています", "info");
        }
    }

    function prevParagraph() {
        if (appData.currentIndex > 0) {
            appData.currentIndex--;
            renderAll();
        } else {
            showToast("これ以上戻れません", "error");
        }
    }

    function applyReplacementsSafely(text) {
        let htmlText = escapeHTML(text);
        const keys = Object.keys(appData.replacements).sort((a, b) => b.length - a.length);
        let placeholders = [];
        
        keys.forEach((key, index) => {
            const escapedKey = escapeHTML(key);
            const safeRegex = new RegExp(escapedKey.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g');
            htmlText = htmlText.replace(safeRegex, `__PLACEHOLDER_${index}__`);
            placeholders[index] = `<span class="replaced">${escapeHTML(appData.replacements[key])}</span>`;
        });
        
        placeholders.forEach((ph, index) => {
            htmlText = htmlText.replace(new RegExp(`__PLACEHOLDER_${index}__`, 'g'), ph);
        });
        
        return htmlText.replace(/\n/g, '<br>');
    }

    function renderSharedView() {
        const s = appData.stories[appData.currentId];
        if (!s) {
            document.getElementById('sharedView').innerHTML = "シナリオを選択してください";
            sendContentToPopout();
            return;
        }
        
        const paragraphs = s.text.split(/\n\s*\n/);
        let html = "";
        for (let i = 0; i < appData.currentIndex; i++) {
            const safeParagraph = applyReplacementsSafely(paragraphs[i]);
            html += `<p>${safeParagraph}</p>`;
        }
        document.getElementById('sharedView').innerHTML = html || "「次の段落へ」を押すと物語が始まります。";
        
        sendContentToPopout();
    }

    function renderGMPanel() {
        const s = appData.stories[appData.currentId];
        if (!s) {
            document.getElementById('progress').textContent = "0";
            document.getElementById('total').textContent = "0";
            document.getElementById('keywordStatus').innerHTML = "要キーワード: ";
            return;
        }

        let count = 0;
        let htmlStatus = "";
        s.keywords.forEach(k => {
            if (appData.replacements[k]) {
                count++;
                htmlStatus += `<span class="done">${escapeHTML(k)}</span> `;
            } else {
                htmlStatus += `<span class="undone">${escapeHTML(k)}</span> `;
            }
        });
        document.getElementById('progress').textContent = count;
        document.getElementById('total').textContent = s.keywords.length;
        document.getElementById('keywordStatus').innerHTML = "要キーワード: " + htmlStatus;
    }

    // --- 改変管理 (登録・削除) ---
    function addReplacement() {
        const b = document.getElementById('beforeKey').value.trim();
        const a = document.getElementById('afterKey').value.trim();
        if (b && a) {
            appData.replacements[b] = a;
            document.getElementById('beforeKey').value = "";
            document.getElementById('afterKey').value = "";
            renderAll();
            showToast(`「${b}」を「${a}」に改変しました`);
        } else {
            showToast("対象と改変後の両方を入力してください", "error");
        }
    }

    function removeReplacement(key) {
        if (appData.replacements[key]) {
            const oldValue = appData.replacements[key];
            delete appData.replacements[key];
            renderAll();
            showToast(`「${key} → ${oldValue}」の改変を取り消しました`, "info");
        }
    }

    // --- 履歴描画 ---
    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        const keys = Object.keys(appData.replacements);
        
        if (keys.length === 0) {
            list.innerHTML = '<li style="color: #666; font-weight: normal;">改変履歴はありません</li>';
            return;
        }
        
        keys.forEach(key => {
            const li = document.createElement('li');
            li.className = 'history-item';
            
            const textSpan = document.createElement('span');
            textSpan.textContent = `${key} → ${appData.replacements[key]}`;
            
            const delBtn = document.createElement('button');
            delBtn.textContent = '解除';
            delBtn.onclick = () => removeReplacement(key);
            
            li.appendChild(textSpan);
            li.appendChild(delBtn);
            list.appendChild(li);
        });
    }

    // --- インポート / エクスポート ---
    function exportData() {
        appData.version = "1.4.0"; 
        const blob = new Blob([JSON.stringify(appData, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `kaidan_tool_backup_${Date.now()}.json`;
        a.click();
        
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        showToast("データをエクスポートしました");
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                
                if (imported && imported.stories && typeof imported.stories === 'object' && !Array.isArray(imported)) {
                    appData = {
                        version: "1.4.0",
                        stories: imported.stories || {},
                        currentId: imported.currentId || "",
                        replacements: imported.replacements || {},
                        currentIndex: imported.currentIndex || 0,
                        popoutFontSize: imported.popoutFontSize || 1.6,
                        audioSettings: imported.audioSettings || { engineType: "standard", volume: 1.0, rate: 1.3, pitch: 1.4, voiceName: "" }
                    };
                    updateSelector();
                    renderAll();
                    showToast("データを正常に復元しました");
                } 
                else if (Array.isArray(imported)) {
                    const convertedStories = {};
                    imported.forEach((s, idx) => {
                        if (s.title && s.text) {
                            const id = s.id || ("s_" + Date.now() + "_" + idx);
                            convertedStories[id] = {
                                title: s.title,
                                text: s.text,
                                keywords: Array.isArray(s.keywords) ? s.keywords : []
                            };
                        }
                    });
                    
                    appData = {
                        version: "1.4.0",
                        stories: convertedStories,
                        currentId: "",
                        replacements: {},
                        currentIndex: 0,
                        popoutFontSize: 1.6,
                        audioSettings: { engineType: "standard", volume: 1.0, rate: 1.3, pitch: 1.4, voiceName: "" }
                    };
                    updateSelector();
                    renderAll();
                    showToast("旧形式データを自動変換して復元しました");
                } else {
                    showToast("無効なデータ形式です", "error");
                }
            } catch (err) {
                showToast("ファイルの解析に失敗しました", "error");
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    }

    function resetAllData() {
        if (confirm("すべてのシナリオおよび進行データが削除されます。よろしいですか？\n（事前にデータをエクスポートしておくことを強くお勧めします）")) {
            localStorage.removeItem('kaidan_data');
            appData = { version: "1.4.0", stories: {}, currentId: "", replacements: {}, currentIndex: 0, popoutFontSize: 1.6, audioSettings: { engineType: "standard", volume: 1.0, rate: 1.3, pitch: 1.4, voiceName: "" } };
            updateSelector();
            renderAll();
            showToast("データを初期化しました", "info");
        }
    }

    // --- 初期化処理 ---
    window.onload = () => {
        const saved = localStorage.getItem('kaidan_data');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (typeof parsed.stories === 'object') {
                    appData = Object.assign(appData, parsed);
                }
            } catch(e) { console.error("データ読み込みエラー", e); }
        }
        
        if (!appData.audioSettings) {
            appData.audioSettings = { engineType: "standard", volume: 1.0, rate: 1.3, pitch: 1.4, voiceName: "" };
        }
        
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                populateVoiceList();
            };
        }
        
        updateSelector();
        renderAll();
    };
</script>
